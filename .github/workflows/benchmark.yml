name: Benchmark

on:
  pull_request:
    branches: [main]

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --benchmark-only --benchmark-json=bench.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench.json